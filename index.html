<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>

    <link rel="icon" type="image/x-icon" href="./assets/images/icons/wild_west_logo.png">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="media.css">
    <link rel="stylesheet" href="dialog.css">

</head>

<body onload="init()">
    <header>
        <div class="header_container">
            <img src="./assets/images/icons/wild_west_logo.png" alt="Logo">
            <nav>
                <a class="fotogram" href="'">Fotogram</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="content">
            <h1><span class="my">My</span> personal photo album</h1>
            <article>
                <ul class="thumbs" id="thumbs">

                </ul>
            </article>

            <dialog class="imagePopup" id="imagePopup" aria-labelledby="imgTitle" aria-describedby="popupImg">
                <header>
                    <h2 class="imgTitle" id="imgTitle"></h2>
                    <button aria-label="Close Popup" onclick="closeDialog()" id="closeButton">X</button>
                </header>
                <section class="popup_content">
                    <img id="popupImg" src="" alt="">
                </section>
                <nav>
                    <button aria-label="Previous Image" onclick="prevImage()" class="navButton">
                        <span class="navText"> &lt; Back</span>
                    </button>
                    <div class="imageNumber" id="imageNumber"></div>
                    <button aria-label="Next Image" onclick="nextImage()" class="navButton">
                        <span class="navText">Next &gt;</span> 
                    </button>
                </nav>
            </dialog>
        </section>

    </main>
    <footer>
        <div class="footer_container">
            <img class="da_logo" src="./assets/images/icons/da_logo_and_copyright.png" alt="DA Logo">
        </div>
    </footer>
</body>

<script src="./script.js"></script>

</html>
