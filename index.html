<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>

    <link rel="icon" type="image/x-icon" href="./assets/images/icons/wild_west_logo.png">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="media.css">

</head>

<body onload="init()">
    <header>
        <img src="./assets/images/icons/wild_west_logo.png" alt="Logo">
        <nav>
            <a class="fotogram" href="'">Fotogram</a>
        </nav>
    </header>
    <main>
        <section class="content">
            <h1><span class="my">My</span> personal photo album</h1>
            <article>
                <ul class="thumbs" id="thumbs">

                </ul>
            </article>

            <dialog id="imagePopup">
                <header>
                    <h2 class="imgName" id="imgName"></h2>
                    <button onclick="closeDialog()" id="closeButton">X</button>
                </header>
                <img id="popupImg" src="" alt="">
                <nav>
                    <button onclick="prevImage()" class="navButton">
                        <span class="navText">Zurück</span>
                    </button>
                    <div></div>
                    <button onclick="nextImage()" class="navButton">
                        <span class="navText">Weiter</span>
                    </button>
                </nav>
            </dialog>
        </section>

    </main>
    <footer>
        <img class="da_logo" src="./assets/images/icons/da_logo.png" alt="DA Logo">
        <img class="copyright" src="./assets/images/icons/© 2023 Developer Akademie GmbH.svg" alt="Copyright">
    </footer>
</body>
<script src="./script.js"></script>

</html>
